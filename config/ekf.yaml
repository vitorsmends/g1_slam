ekf_filter_node:
  ros__parameters:

    use_sim_time: false
    frequency: 50.0

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    publish_tf: true
    two_d_mode: true

    # ODOM
    odom0: /dog_odom_fixed
    odom0_config: [true, true, false,
                   false, false, false,
                   true, true, false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false

    # IMU (CRÍTICO)
    imu0: /dog_imu_raw
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]

    imu0_differential: false
    imu0_remove_gravitational_acceleration: true