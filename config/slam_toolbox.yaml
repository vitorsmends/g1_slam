slam_toolbox:
  ros__parameters:
    use_sim_time: true

    scan_topic: /scan_slam
    odom_frame: odom_slam
    base_frame: base_link_slam
    map_frame: map_slam

    mode: mapping
    resolution: 0.05
    max_laser_range: 50.0
    minimum_time_interval: 0.2
    transform_publish_period: 0.05

    map_update_interval: 5.0
    throttle_scans: 1