# ─── slam_toolbox — Unitree G1 ────────────────────────────────────────────────
#
# Frame convention:
#   odom → base_link  (via odom_to_tf, corrigido pelo offset de clock)
#   base_link → ... → livox_frame  (cadeia do robô)
#
# O slam_toolbox publica: map → odom

slam_toolbox:
  ros__parameters:

    # ── Frames ───────────────────────────────────────────────────────────────
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan

    # ── Modo ─────────────────────────────────────────────────────────────────
    mode: mapping

    # ── Solver ───────────────────────────────────────────────────────────────
    solver_plugin:              solver_plugins::CeresSolver
    ceres_linear_solver:        SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:       SCHUR_JACOBI
    ceres_trust_strategy:       LEVENBERG_MARQUARDT
    ceres_dogleg_type:          TRADITIONAL_DOGLEG
    ceres_loss_function:        None

    # ── Scan Matcher — mais agressivo para corrigir drift de odom ─────────────
    #
    # Aumentamos o search space angular para que o matcher consiga
    # corrigir erros de yaw maiores da odometria do G1.
    scan_buffer_size:                    20      # mais scans no buffer
    scan_buffer_maximum_scan_distance:   10.0
    link_match_minimum_response_fine:    0.1
    link_scan_maximum_distance:          2.0     # aceita matches mais distantes
    loop_search_maximum_distance:        5.0     # busca loop closing mais longe
    do_loop_closing:                     true
    loop_match_minimum_chain_size:       10
    loop_match_maximum_variance_coarse:  3.0
    loop_match_minimum_response_coarse:  0.35
    loop_match_minimum_response_fine:    0.45

    # ── Correlação — search space maior para corrigir yaw ─────────────────────
    distance_variance_penalty:   0.3     # menos penalidade em distância
    angle_variance_penalty:      0.5     # menos penalidade angular — permite
                                         # corrigir mais o yaw da odometria
    fine_search_angle_offset:    0.00349
    coarse_search_angle_offset:  0.785   # ~45° — cobre o erro observado
    coarse_angle_resolution:     0.0349
    minimum_angle_penalty:       0.9
    minimum_distance_penalty:    0.5
    use_response_expansion:      true

    # ── Mapa ──────────────────────────────────────────────────────────────────
    resolution:           0.05
    map_update_interval:  5.0
    max_laser_range:     20.0

    # ── Misc ──────────────────────────────────────────────────────────────────
    minimum_travel_distance:   0.1
    minimum_travel_heading:    0.175
    transform_publish_period:  0.02
    transform_timeout:         0.5
    tf_buffer_duration:       60.0

    # ── Serialização ──────────────────────────────────────────────────────────
    use_map_saver:       false
    map_file_name:       ""
    map_start_pose:      [0.0, 0.0, 0.0]
    map_start_at_dock:   false
    debug_logging:       false
    throttle_scans:      2