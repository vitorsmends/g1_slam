slam_toolbox:
  ros__parameters:
    use_sim_time: true

    scan_topic: /scan_fixed
    odom_frame: odom
    base_frame: base_link

    mode: mapping
    resolution: 0.05
    max_laser_range: 50.0
    minimum_time_interval: 0.2
    transform_publish_period: 0.05

    map_update_interval: 5.0
    throttle_scans: 1
