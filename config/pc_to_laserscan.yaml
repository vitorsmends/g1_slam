# ─── pointcloud_to_laserscan — Unitree G1 / Livox Mid360 ──────────────────────
#
# Configuração baseada na que funcionava no robô.
#
# target_frame: livox_frame
#   Projeção direta no frame do sensor, sem lookup de TF adicional.
#   O livox_frame tem 180° de roll (sensor montado invertido no mid360_link),
#   mas como projetamos no próprio frame, isso é transparente.
#   O slam_toolbox resolve a pose completa via TF:
#     livox_frame → mid360_link → torso_link → ... → base_link → odom

pc_to_ls:
  ros__parameters:
    target_frame: livox_frame
    transform_tolerance: 2.0

    min_height: -1.0
    max_height:  1.0

    angle_min:        -3.1415
    angle_max:         3.1415
    angle_increment:   0.0087   # ≈ 0.5°
    scan_time:         0.1      # 10 Hz
    range_min:         0.3
    range_max:        50.0

    use_inf:     true
    inf_epsilon: 1.0