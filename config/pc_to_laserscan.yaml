# ─── pointcloud_to_laserscan parameters ───────────────────────────────────────
#
# Converts the Livox 3D point cloud into a 2D LaserScan that slam_toolbox can
# consume.  Only points within [min_height, max_height] relative to the sensor
# frame are kept, giving us a "virtual horizontal slice" of the environment.
#
# IMPORTANT – target_frame:
#   We project into base_link so that the 2D scan is expressed in a frame that
#   is upright (gravity-aligned) and centred on the robot.  This compensates for
#   any pitch/roll the robot_center / livox_frame may accumulate while walking.
#
# Adjust min_height / max_height to choose which slice of the world to map.
# For a humanoid walking indoors, keeping -0.3 → +0.3 m around base_link Z
# captures walls and furniture legs without floor or ceiling noise.

pointcloud_to_laserscan_node:
  ros__parameters:
    # Source frame is livox_frame; we re-express points in base_link before slicing
    target_frame: base_link
    transform_tolerance: 0.1          # [s]  TF lookup tolerance

    # Vertical slice (relative to target_frame Z)
    min_height: -0.30                 # [m]
    max_height:  0.30                 # [m]

    # 2-D scan geometry
    angle_min:  -3.14159265           # [rad]  full 360° — Livox covers ≥120°
    angle_max:   3.14159265
    angle_increment: 0.00436332       # [rad]  ≈ 0.25°
    scan_time:   0.10                 # [s]    matches typical Livox 10 Hz publish
    range_min:   0.10                 # [m]
    range_max:  30.0                  # [m]

    # Use intensity field from Livox if available
    use_inf: true
    inf_epsilon: 1.0
