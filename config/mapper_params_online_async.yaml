slam_toolbox:
  ros__parameters:

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    tracking_frame: base_link
    scan_topic: /scan_fixed

    mode: mapping

    transform_publish_period: 0.05
    transform_timeout: 0.3
    tf_buffer_duration: 20.0
    lookup_transform_timeout: 0.2
    
    use_sim_time: false

    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.2
    stack_size_to_use: 40000000

    use_scan_matching: true
    use_scan_barycenter: false

    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.15

    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 10.0

    do_loop_closing: true
    loop_search_distance: 3.0
    loop_match_minimum_chain_size: 15

    loop_match_maximum_variance_coarse: 1.5
    loop_match_minimum_response_coarse: 0.55
    loop_match_minimum_response_fine: 0.65

    link_match_minimum_response_fine: 0.35
    link_scan_maximum_distance: 0.8